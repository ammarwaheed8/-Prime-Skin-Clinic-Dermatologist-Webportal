<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discount Popup</title>
  <style>
    /* Ensure body doesn't scroll when popup is active */
    body.popup-active {
      overflow: hidden;
    }

    /* Popup Overlay */
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6); /* Semi-transparent black overlay */
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px); /* Increased blur for background content */
      -webkit-backdrop-filter: blur(8px); /* Support for Safari */
    }

    /* Popup Content */
    .popup-content {
      background: linear-gradient(135deg, #1c2526 0%, #2d3a3c 100%);
      padding: 50px 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 95%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(212, 175, 55, 0.3);
      position: relative;
      border: 3px solid #d4af37;
      animation: fadeIn 0.5s ease-in-out;
    }

    /* Fade-in Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Close Button */
    .popup-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #d4af37;
      transition: color 0.3s, transform 0.2s;
    }

    .popup-close:hover {
      color: #f1c40f;
      transform: rotate(90deg);
    }

    /* Heading */
    .popup-content h2 {
      font-size: 32px;
      color: #d4af37;
      margin-bottom: 20px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* Paragraph */
    .popup-content p {
      font-size: 18px;
      color: #e0e0e0;
      margin-bottom: 30px;
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
    }

    .popup-content p strong {
      color: #f1c40f;
      font-weight: bold;
    }

    /* Booking Button */
    .booking-button {
      background: linear-gradient(45deg, #d4af37, #f1c40f);
      color: #1c2526;
      padding: 15px 35px;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
    }

    .booking-button:hover {
      background: linear-gradient(45deg, #f1c40f, #d4af37);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
    }

    .booking-button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }
  </style>
</head>
<body>
  <div class="popup-overlay" id="discountPopup">
    <div class="popup-content">
      <span class="popup-close" onclick="closePopup()">&times;</span>
      <h2>Unlock Radiant Skin!</h2>
      <p>Secure your appointment online now and enjoy an <strong>exclusive 10% discount</strong> on your next dermatology treatment. Don’t miss this limited-time offer to enhance your skin’s natural glow!</p>
      <a href="#booking-form" class="booking-button">Book Now & Save</a>
    </div>
  </div>

  <script>
    // Show popup 5 seconds after page loads
    window.onload = function() {
      setTimeout(function() {
        document.getElementById('discountPopup').style.display = 'flex';
        document.body.classList.add('popup-active'); // Add class to body to prevent scrolling
      }, 5000);
    };

    // Close popup function
    function closePopup() {
      document.getElementById('discountPopup').style.display = 'none';
      document.body.classList.remove('popup-active'); // Remove class to restore scrolling
    }
  </script>
</body>
</html>
